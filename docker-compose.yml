version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-literacy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ailiteracy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ailiteracy123}
      POSTGRES_DB: ${POSTGRES_DB:-ailiteracy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ailiteracy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-literacy-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-literacy-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-literacy-network

  # Backend API
  backend:
    build:
      context: ./backend
      target: ${BUILD_TARGET:-dev}
    container_name: ai-literacy-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ailiteracy}:${POSTGRES_PASSWORD:-ailiteracy123}@postgres:5432/${POSTGRES_DB:-ailiteracy}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-literacy-network

  # Frontend Next.js App
  frontend:
    build:
      context: ./frontend
      target: ${BUILD_TARGET:-dev}
    container_name: ai-literacy-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - ai-literacy-network

  # Database Admin (optional, for development)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai-literacy-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ailiteracy.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - ai-literacy-network
    profiles:
      - admin

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  ai-literacy-network:
    driver: bridge
